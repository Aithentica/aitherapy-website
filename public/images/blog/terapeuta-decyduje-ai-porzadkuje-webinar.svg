<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#e8eef6"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8d5ba" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7bc8a4" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8c9e8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#92afd7" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="blob3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2c6d0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8a0b4" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5ee"/>
      <stop offset="100%" stop-color="#d4eddf"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <ellipse cx="150" cy="500" rx="200" ry="180" fill="url(#blob1)"/>
  <ellipse cx="1050" cy="130" rx="220" ry="190" fill="url(#blob2)"/>
  <ellipse cx="950" cy="520" rx="170" ry="150" fill="url(#blob3)"/>
  <ellipse cx="300" cy="80" rx="160" ry="120" fill="url(#blob3)" opacity="0.5"/>

  <!-- Laptop -->
  <g transform="translate(600, 315)">
    <!-- Laptop base -->
    <rect x="-180" y="60" width="360" height="18" rx="4" fill="#c5cdd8"/>
    <path d="M-200 78 L-180 60 L180 60 L200 78 Z" fill="#b0b9c6" rx="3"/>

    <!-- Laptop screen frame -->
    <rect x="-160" y="-130" width="320" height="195" rx="10" fill="#4a5568"/>

    <!-- Screen content -->
    <rect x="-148" y="-120" width="296" height="170" rx="5" fill="url(#screen)"/>

    <!-- Video call grid on screen -->
    <!-- Person 1 (therapist) -->
    <rect x="-138" y="-110" width="90" height="70" rx="4" fill="#fff" opacity="0.9"/>
    <circle cx="-93" cy="-88" r="14" fill="#e8a0b4"/>
    <circle cx="-93" cy="-90" r="10" fill="#fdd8b5"/>
    <rect x="-110" y="-68" width="34" height="18" rx="4" fill="#7bc8a4"/>

    <!-- Person 2 -->
    <rect x="-40" y="-110" width="90" height="70" rx="4" fill="#fff" opacity="0.9"/>
    <circle cx="5" cy="-88" r="14" fill="#92afd7"/>
    <circle cx="5" cy="-90" r="10" fill="#fdd8b5"/>
    <rect x="-12" y="-68" width="34" height="18" rx="4" fill="#b8c9e8"/>

    <!-- Person 3 -->
    <rect x="58" y="-110" width="90" height="70" rx="4" fill="#fff" opacity="0.9"/>
    <circle cx="103" cy="-88" r="14" fill="#a8d5ba"/>
    <circle cx="103" cy="-90" r="10" fill="#fdd8b5"/>
    <rect x="86" y="-68" width="34" height="18" rx="4" fill="#f2c6d0"/>

    <!-- AI panel on screen bottom -->
    <rect x="-138" y="-32" width="286" height="38" rx="4" fill="#fff" opacity="0.85"/>

    <!-- AI icon -->
    <circle cx="-118" cy="-13" r="12" fill="#7bc8a4" opacity="0.2"/>
    <path d="M-124 -16 l4 -4 l4 4 m-4 -4 v12 m-6 -4 h12" stroke="#4a9e6e" stroke-width="1.8" stroke-linecap="round" fill="none"/>

    <!-- AI text lines -->
    <rect x="-100" y="-22" width="80" height="5" rx="2" fill="#a8d5ba" opacity="0.6"/>
    <rect x="-100" y="-13" width="120" height="5" rx="2" fill="#b8c9e8" opacity="0.5"/>
    <rect x="-100" y="-4" width="60" height="5" rx="2" fill="#a8d5ba" opacity="0.4"/>

    <!-- Checkmarks -->
    <g transform="translate(60, -20)">
      <circle cx="0" cy="0" r="7" fill="#7bc8a4" opacity="0.2"/>
      <path d="M-3 0 l2 2 l4 -4" stroke="#4a9e6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <g transform="translate(80, -20)">
      <circle cx="0" cy="0" r="7" fill="#7bc8a4" opacity="0.2"/>
      <path d="M-3 0 l2 2 l4 -4" stroke="#4a9e6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <g transform="translate(100, -20)">
      <circle cx="0" cy="0" r="7" fill="#7bc8a4" opacity="0.2"/>
      <path d="M-3 0 l2 2 l4 -4" stroke="#4a9e6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- Floating elements left side -->
  <!-- Clipboard / notes -->
  <g transform="translate(180, 200)">
    <rect x="-40" y="-55" width="80" height="110" rx="8" fill="#fff" stroke="#d4eddf" stroke-width="2"/>
    <rect x="-25" y="-60" width="50" height="14" rx="4" fill="#7bc8a4"/>
    <rect x="-28" y="-35" width="56" height="5" rx="2" fill="#e2e8f0"/>
    <rect x="-28" y="-24" width="40" height="5" rx="2" fill="#e2e8f0"/>
    <rect x="-28" y="-13" width="50" height="5" rx="2" fill="#e2e8f0"/>
    <rect x="-28" y="-2" width="30" height="5" rx="2" fill="#e2e8f0"/>
    <path d="M-28 16 l5 5 l10 -10" stroke="#7bc8a4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="-10" y="14" width="38" height="5" rx="2" fill="#a8d5ba" opacity="0.5"/>
    <path d="M-28 32 l5 5 l10 -10" stroke="#7bc8a4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="-10" y="30" width="30" height="5" rx="2" fill="#a8d5ba" opacity="0.5"/>
  </g>

  <!-- Brain/mind icon -->
  <g transform="translate(320, 140)">
    <circle cx="0" cy="0" r="32" fill="#f0f4f8" stroke="#b8c9e8" stroke-width="2"/>
    <path d="M-8 8 C-8 -12 -14 -16 -6 -20 C2 -24 6 -18 6 -18 C6 -18 14 -22 18 -14 C22 -6 14 0 14 0 C14 0 20 8 14 14 C8 20 2 14 2 14 C2 14 -6 20 -12 14 C-18 8 -8 8 -8 8Z" fill="#b8c9e8" opacity="0.4" stroke="#92afd7" stroke-width="1.5"/>
    <path d="M0 -6 v20" stroke="#92afd7" stroke-width="1.2" stroke-dasharray="3 2"/>
  </g>

  <!-- Floating elements right side -->
  <!-- Clock -->
  <g transform="translate(1000, 230)">
    <circle cx="0" cy="0" r="30" fill="#fff" stroke="#f2c6d0" stroke-width="2"/>
    <circle cx="0" cy="0" r="2.5" fill="#e8a0b4"/>
    <line x1="0" y1="0" x2="0" y2="-16" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="10" y2="-4" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
    <!-- 60 min label -->
    <text x="0" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e8a0b4">60 min</text>
  </g>

  <!-- Shield / safety -->
  <g transform="translate(1030, 400)">
    <path d="M0 -30 L24 -18 L24 6 C24 22 0 34 0 34 C0 34 -24 22 -24 6 L-24 -18 Z" fill="#fff" stroke="#a8d5ba" stroke-width="2"/>
    <path d="M-7 0 l5 5 l10 -10" stroke="#7bc8a4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Connection dots / data flow -->
  <g opacity="0.3">
    <circle cx="380" cy="350" r="4" fill="#92afd7"/>
    <circle cx="410" cy="330" r="3" fill="#7bc8a4"/>
    <circle cx="395" cy="380" r="3.5" fill="#e8a0b4"/>
    <circle cx="820" cy="200" r="4" fill="#92afd7"/>
    <circle cx="850" cy="220" r="3" fill="#7bc8a4"/>
    <circle cx="800" cy="230" r="3.5" fill="#e8a0b4"/>
  </g>

  <!-- Title text -->
  <text x="600" y="530" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#2d3748">
    Decyduje terapeuta, AI porządkuje
  </text>
  <text x="600" y="562" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#718096">
    Bezpłatny webinar | Wtorek 03.03.2026, 19:00 | 60 minut praktyki
  </text>

  <!-- Small decorative dots -->
  <circle cx="70" cy="300" r="6" fill="#a8d5ba" opacity="0.3"/>
  <circle cx="100" cy="400" r="4" fill="#b8c9e8" opacity="0.25"/>
  <circle cx="1130" cy="350" r="5" fill="#f2c6d0" opacity="0.3"/>
  <circle cx="1100" cy="500" r="7" fill="#a8d5ba" opacity="0.2"/>
</svg>